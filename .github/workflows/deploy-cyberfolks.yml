name: Deploy to cyber-folks (from WordPress)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wp-publish]

concurrency:
  group: cyberfolks
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static z WordPressa
        env:
          CONTENT_SOURCE: wp
          WP_GRAPHQL_URL: http://wolontariat.org.pl/cms/graphql
        run: npm run build
      - name: Deploy FTP (lftp, bez kasowania /cms)
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u 'admin@wolontariat.org.pl,'"$FTP_PASSWORD" s32.cyber-folks.pl -e "set ssl:verify-certificate no; set net:timeout 40; set mirror:parallel-transfer-count 4; mirror -R --only-newer --exclude-glob .DS_Store out public_html; bye"
